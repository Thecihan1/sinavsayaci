<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İnteraktif Dünya Haritası</title>
    <!-- D3.js ve TopoJSON kütüphanelerini CDN üzerinden çekiyoruz -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    
    <style>
        body {
            margin: 0;
            background-color: #050505; /* Sayfa arka planı çok koyu */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        #map-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Harita üzerindeki ülkelerin stili */
        path {
            fill: #333333; /* Kara parçaları: Koyu Gri */
            stroke: #000000; /* Ülke sınırları: Siyah */
            stroke-width: 0.5px;
            transition: fill 0.3s, transform 0.3s; /* Yumuşak geçişler */
            cursor: pointer;
        }

        /* Mouse üzerine gelince (Hover) */
        path:hover {
            fill: #555555; /* Hafif açılan gri */
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
        }

        /* Zoom yapıldığında arka planın durumu */
        .zoomed-bg {
            fill: #111111; /* Sular: Açık Siyah / Koyu Gri */
        }
    </style>
</head>
<body>

    <div id="map-container"></div>

    <script>
        // 1. Harita Ayarları
        const width = window.innerWidth;
        const height = window.innerHeight;
        const svg = d3.select("#map-container").append("svg")
            .attr("width", width)
            .attr("height", height)
            .attr("viewBox", `0 0 ${width} ${height}`);

        // 2. Zoom ve Pan (Kaydırma) Ayarları
        const zoom = d3.zoom()
            .scaleExtent([1, 8]) // Minimum ve maksimum zoom seviyesi
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });

        svg.call(zoom);

        // Haritayı çizmek için bir grup (group) oluşturuyoruz
        const g = svg.append("g");

        // 3. Harita Verisini Çekme ve Projeksiyon
        // D3 Geo Mercator projeksiyonu kullanıyoruz
        const projection = d3.geoMercator()
            .center([0, 20]) // Haritayı dikey olarak biraz yukarı kaydır
            .scale(width / 5.5) // Ekran genişliğine göre ölçek
            .translate([width / 2, height / 2]);

        // 4. TopoJSON Verisini Yükle
        // Dünyanın topoğrafik verisini buradan çekiyoruz.
        d3.json("https://unpkg.com/world-atlas@2.0.2/countries-110m.json").then(world => {
            
            // TopoJSON'u GeoJSON'a çeviriyoruz
            const countries = topojson.feature(world, world.objects.countries).features;

            // 5. Haritayı Çizme
            g.selectAll("path")
                .data(countries)
                .enter().append("path")
                .attr("d", d3.geoPath().projection(projection))
                .attr("class", "country");

            // 6. İnteraktif Özellikler (Mouse Bekleme ve Zoom)
            const hoverTimeout = 2000; // 2 saniye (2000 ms)
            let timer = null;

            g.selectAll("path")
                .on("mouseenter", function(event, d) {
                    // Mouse üzerine gelince hemen biraz büyüt
                    d3.select(this)
                        .transition()
                        .duration(200)
                        .attr("transform", "scale(1.02)");

                    // 2 saniyelik sayacı başlat
                    timer = setTimeout(() => {
                        zoomToCountry(d);
                    }, hoverTimeout);
                })
                .on("mouseleave", function() {
                    // Mouse çıkarsa büyümeyi geri al
                    d3.select(this)
                        .transition()
                        .duration(200)
                        .attr("transform", "scale(1)");

                    // Sayacı iptal et (yeni bir ülke üzerine gelince de iptal edilmeli)
                    clearTimeout(timer);
                });

            // 7. Zoom Fonksiyonu
            function zoomToCountry(feature) {
                // Ülkenin merkezini (centroid) bul
                const centroid = d3.geoCentroid(feature);
                
                // Projeksiyona göre koordinatları hesapla
                const [x, y] = projection(centroid);

                // Zoom yap
                svg.transition()
                    .duration(1000) // 1 saniye sürede zoom yap
                    .call(
                        zoom.transform, 
                        d3.zoomIdentity.translate(width / 2, height / 2).scale(3).translate(-x, -y)
                    );
            }
        });

        // Pencere boyutu değişirse haritayı güncelle
        window.addEventListener('resize', () => {
            // Basit bir yenileme (Gerçek projede daha detaylı hesaplanmalı)
            location.reload(); 
        });

    </script>
</body>
</html>
