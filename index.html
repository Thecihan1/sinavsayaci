<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dünya Haritası</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0f1e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 1.8rem;
      letter-spacing: 2px;
      color: #7ec8e3;
    }

    #map-container {
      width: 95vw;
      max-width: 1200px;
      background: #0d1b2a;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 0 60px rgba(126, 200, 227, 0.15);
    }

    svg#world {
      width: 100%;
      height: auto;
      display: block;
    }

    .country {
      fill: #2a6496;
      stroke: #0a0f1e;
      stroke-width: 0.5;
      cursor: pointer;
      transform-origin: center;
      transform-box: fill-box;
      transition: transform 0.25s ease, fill 0.25s ease, filter 0.25s ease;
    }

    .country:hover {
      fill: #f0a500;
      transform: scale(2);
      filter: drop-shadow(0 0 10px rgba(240, 165, 0, 0.9));
      z-index: 999;
    }

    #tooltip {
      position: fixed;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      pointer-events: none;
      display: none;
      border: 1px solid #f0a500;
      z-index: 1000;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <h1>Dünya Haritası</h1>
  <div id="map-container">
    <svg id="world" viewBox="0 0 2000 1001" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div id="tooltip"></div>

  <script>
    const tooltip = document.getElementById('tooltip');

    document.addEventListener('mousemove', (e) => {
      tooltip.style.left = (e.clientX + 15) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
    });

    async function loadMap() {
      const res = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
      const world = await res.json();

      const { feature } = await import('https://cdn.skypack.dev/topojson-client@3');
      const { geoNaturalEarth1, geoPath } = await import('https://cdn.skypack.dev/d3-geo@3');

      const countryNames = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
        .then(() => fetch('https://raw.githubusercontent.com/lukes/ISO-3166-Countries-with-Regional-Codes/master/slim-2/slim-2.json'))
        .then(r => r.json())
        .then(data => {
          const map = {};
          data.forEach(c => { map[c['country-code']] = c.name; });
          return map;
        })
        .catch(() => ({}));

      const svg = document.getElementById('world');
      const width = 2000;
      const height = 1001;

      const projection = geoNaturalEarth1()
        .scale(320)
        .translate([width / 2, height / 2]);

      const path = geoPath().projection(projection);
      const countries = feature(world, world.objects.countries);

      countries.features.forEach(f => {
        const d = path(f);
        if (!d) return;

        const pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        pathEl.setAttribute('d', d);
        pathEl.classList.add('country');

        const numericId = f.id;
        const name = countryNames[String(numericId).padStart(3, '0')] || `Ülke (${numericId})`;

        pathEl.addEventListener('mouseenter', () => {
          tooltip.textContent = name;
          tooltip.style.display = 'block';
        });

        pathEl.addEventListener('mouseleave', () => {
          tooltip.style.display = 'none';
        });

        svg.appendChild(pathEl);
      });
    }

    loadMap().catch(err => {
      document.getElementById('map-container').innerHTML =
        '<p style="color:red;text-align:center">Harita yüklenemedi: ' + err.message + '</p>';
    });
  </script>
</body>
</html>
