<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dünya Haritası</title>

<style>
body {
    background: #0a0f1e;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

h1 {
    margin: 20px;
    color: #7ec8e3;
}

svg {
    width: 100%;
    max-width: 1200px;
    height: auto;
}

.country {
    fill: #2a6496;
    stroke: #0a0f1e;
    stroke-width: 0.5;
    transition: 0.3s;
}

.country:hover {
    fill: orange;
}
</style>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>

</head>
<body>

<h1>Dünya Haritası</h1>

<svg id="world" viewBox="0 0 1000 500"></svg>

<script>

const width = 1000;
const height = 500;

const svg = d3.select("#world");

const projection = d3.geoNaturalEarth1()
    .scale(160)
    .translate([width / 2, height / 2]);

const path = d3.geoPath().projection(projection);

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
.then(function(worldData) {

    const countries = topojson.feature(worldData, worldData.objects.countries);

    svg.selectAll("path")
        .data(countries.features)
        .enter()
        .append("path")
        .attr("d", path)
        .attr("class", "country");

})
.catch(function(error) {
    document.body.innerHTML += "<p style='color:red'>Harita yüklenemedi</p>";
});

</script>

</body>
</html>
