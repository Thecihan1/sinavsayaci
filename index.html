<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Nekadar Kaldı - Dünya Haritası</title>
    <style>
        body {
            margin: 0;
            background-color: #0b0b0b; /* Çok koyu arka plan */
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Inter', sans-serif;
            color: #eee;
            overflow-x: hidden;
        }

        .title { margin-top: 40px; letter-spacing: 4px; font-weight: bold; text-transform: uppercase; }

        /* Harita Kutusu: Orta-Üst, Sabit Boyut */
        #map-container {
            margin-top: 30px;
            width: 800px; 
            height: 450px;
            background-color: #151515; /* Deniz Rengi: Açık Siyah */
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 1px solid #2a2a2a;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        svg {
            width: 100%;
            height: 100%;
            /* Viewbox animasyonu için transition */
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* Kara Parçaları: Açık Gri */
        path {
            fill: #555555;
            stroke: #151515;
            stroke-width: 0.5;
            cursor: pointer;
            transition: fill 0.4s ease, filter 0.8s ease, opacity 0.8s ease;
        }

        path:hover {
            fill: #999999; /* Üstüne gelince hafif parlar */
        }

        /* Zoom anında diğer ülkeler */
        .blur-others {
            filter: blur(6px) grayscale(1);
            opacity: 0.15;
        }

        /* Odaklanan ülke */
        .focused {
            fill: #ffffff !important;
            filter: none !important;
            opacity: 1 !important;
            stroke: #fff;
            stroke-width: 0.2;
        }
    </style>
</head>
<body>

    <h2 class="title">NE KADAR KALDI?</h2>

    <div id="map-container">
        <svg id="worldMap" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet">
            <g id="map-g"></g>
        </svg>
    </div>

<script>
    const svg = document.getElementById('worldMap');
    const group = document.getElementById('map-g');
    let zoomTimer;
    const originalViewBox = "0 0 1000 500";

    // Gerçek harita verisini çekiyoruz
    fetch('https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson')
        .then(res => res.json())
        .then(data => {
            data.features.forEach(feature => {
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", generatePath(feature));
                
                path.addEventListener('mouseenter', () => {
                    // 2 saniye kuralı
                    zoomTimer = setTimeout(() => zoomTo(path), 2000);
                });

                path.addEventListener('mouseleave', () => {
                    clearTimeout(zoomTimer);
                    resetZoom();
                });

                group.appendChild(path);
            });
        });

    function generatePath(feature) {
        let d = "";
        const type = feature.geometry.type;
        const coords = type === "MultiPolygon" ? feature.geometry.coordinates : [feature.geometry.coordinates];
        
        coords.forEach(poly => {
            const ring = type === "MultiPolygon" ? poly[0] : poly;
            ring.forEach((c, i) => {
                const x = (c[0] + 180) * (1000 / 360);
                const y = (90 - c[1]) * (500 / 180);
                d += (i === 0 ? "M" : "L") + x + "," + y;
            });
            d += "Z";
        });
        return d;
    }

    function zoomTo(el) {
        const bbox = el.getBBox();
        
        // Ülkeyi merkeze alacak yeni viewBox değerleri
        // Padding ekleyerek ülkenin kenarlara yapışmasını engelliyoruz
        const padding = 20;
        const width = bbox.width + padding * 2;
        const height = bbox.height + padding * 2;
        const x = bbox.x - padding;
        const y = bbox.y - padding;

        // ViewBox'ı güncelle (Kamerayı odakla)
        svg.setAttribute("viewBox", `${x} ${y} ${width} ${height}`);
        
        // Görsel efektleri uygula
        document.querySelectorAll('path').forEach(p => {
            if(p === el) p.classList.add('focused');
            else p.classList.add('blur-others');
        });
    }

    function resetZoom() {
        svg.setAttribute("viewBox", originalViewBox);
        document.querySelectorAll('path').forEach(p => {
            p.classList.remove('focused', 'blur-others');
        });
    }
</script>

</body>
</html>
