<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #fafafa;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 350px;
  }

  .card {
    background: #fff;
    border: 1px solid #dbdbdb;
    border-radius: 1px;
    padding: 40px 40px 24px;
    width: 100%;
    margin-bottom: 10px;
    text-align: center;
  }

  .logo {
    font-family: 'Billabong', 'Grand Hotel', cursive;
    font-size: 52px;
    font-weight: 400;
    color: #262626;
    margin-bottom: 24px;
    letter-spacing: -1px;
    font-style: normal;
  }

  /* Fallback logo using SVG-like text style */
  .logo-img {
    width: 175px;
    height: 51px;
    margin: 0 auto 20px;
    display: block;
  }

  .form-group {
    margin-bottom: 6px;
    position: relative;
  }

  .form-input {
    width: 100%;
    padding: 9px 10px 7px;
    border: 1px solid #dbdbdb;
    border-radius: 3px;
    background: #fafafa;
    font-size: 12px;
    color: #262626;
    outline: none;
    transition: border-color 0.1s;
    height: 38px;
  }

  .form-input:focus {
    border-color: #a8a8a8;
    background: #fff;
  }

  .form-input.has-value {
    padding-top: 14px;
    padding-bottom: 2px;
  }

  .floating-label {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    color: #8e8e8e;
    pointer-events: none;
    transition: all 0.1s ease;
  }

  .form-input:focus + .floating-label,
  .form-input.has-value + .floating-label {
    top: 8px;
    transform: translateY(0);
    font-size: 10px;
  }

  .show-hide-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    font-size: 14px;
    font-weight: 600;
    color: #262626;
    cursor: pointer;
    display: none;
  }

  .form-input:not(:placeholder-shown) ~ .show-hide-btn,
  .form-input.has-value ~ .show-hide-btn {
    display: block;
  }

  .login-btn {
    width: 100%;
    padding: 7px 16px;
    background: #0095f6;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    height: 32px;
    transition: background 0.1s;
    opacity: 0.5;
    pointer-events: none;
  }

  .login-btn.active {
    opacity: 1;
    pointer-events: all;
  }

  .login-btn.active:hover {
    background: #1877f2;
  }

  .or-divider {
    display: flex;
    align-items: center;
    margin: 18px 0;
    gap: 18px;
  }

  .or-divider::before,
  .or-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #dbdbdb;
  }

  .or-divider span {
    font-size: 13px;
    font-weight: 600;
    color: #8e8e8e;
    letter-spacing: 1px;
  }

  .facebook-login {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #385185;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    margin-bottom: 16px;
    background: none;
    border: none;
    width: 100%;
  }

  .facebook-login:hover {
    color: #1a3a6b;
  }

  .facebook-icon {
    width: 18px;
    height: 18px;
    fill: #385185;
  }

  .forgot-password {
    font-size: 12px;
    color: #00376b;
    text-decoration: none;
    display: block;
    margin-top: 12px;
    cursor: pointer;
  }

  .forgot-password:hover {
    color: #000;
  }

  .signup-card {
    background: #fff;
    border: 1px solid #dbdbdb;
    border-radius: 1px;
    padding: 20px 40px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    color: #262626;
    margin-bottom: 12px;
  }

  .signup-card a {
    color: #0095f6;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
  }

  .signup-card a:hover {
    text-decoration: underline;
  }

  .app-download {
    text-align: center;
    margin-top: 12px;
    font-size: 14px;
    color: #262626;
    margin-bottom: 16px;
  }

  .app-badges {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 10px;
  }

  .app-badge {
    border: 1px solid #262626;
    border-radius: 5px;
    padding: 5px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    text-decoration: none;
    color: #262626;
  }

  .app-badge:hover {
    background: #f0f0f0;
  }

  .badge-text { text-align: left; }
  .badge-sub { font-size: 9px; color: #262626; }
  .badge-main { font-size: 13px; font-weight: 600; color: #262626; }

  footer {
    text-align: center;
    padding: 20px;
    color: #8e8e8e;
    font-size: 12px;
  }

  footer .links {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 16px;
    justify-content: center;
    margin-bottom: 12px;
  }

  footer .links a {
    color: #8e8e8e;
    text-decoration: none;
    font-size: 12px;
    cursor: pointer;
  }

  footer .links a:hover { text-decoration: underline; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">
</head>
