<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dünya Haritası</title>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>

<style>

body{
    margin:0;
    background:#111;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:60px;
    color:white;
}

/* HARİTA ÇERÇEVESİ */
#map-wrapper{
    width:800px;
    height:450px;
    background:#0d0d0d;
    border-radius:20px;
    overflow:hidden;
    position:relative;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
}

/* SVG */
svg{
    width:100%;
    height:100%;
}

/* DENİZ */
.ocean{
    fill:#1a1a1a;
}

/* ÜLKELER */
.country{
    fill:#888;
    stroke:#333;
    stroke-width:0.5;
    transition:all 0.5s ease;
}

/* Hover normal */
.country:hover{
    fill:#aaa;
}

/* Blur efekti */
.blur{
    filter:blur(6px);
    opacity:0.4;
}

/* Seçilen ülke */
.active-country{
    fill:#ddd !important;
    filter:none !important;
    opacity:1 !important;
}

</style>
</head>

<body>

<div id="map-wrapper">
    <svg id="map"></svg>
</div>

<script>

const width = 800;
const height = 450;

const svg = d3.select("#map")
    .attr("viewBox", `0 0 ${width} ${height}`);

const projection = d3.geoNaturalEarth1()
    .scale(130)
    .translate([width/2, height/2]);

const path = d3.geoPath().projection(projection);

/* DENİZ ARKAPLAN */
svg.append("rect")
    .attr("width", width)
    .attr("height", height)
    .attr("class","ocean");

let zoomed = false;
let hoverTimer = null;

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
.then(data=>{

    const countries = topojson.feature(data, data.objects.countries);

    const countryPaths = svg.selectAll("path.country")
        .data(countries.features)
        .enter()
        .append("path")
        .attr("d", path)
        .attr("class","country");

    countryPaths
        .on("mouseenter", function(event,d){

            if(zoomed) return;

            hoverTimer = setTimeout(()=>{

                zoomed = true;

                /* diğer ülkeleri blur yap */
                countryPaths.classed("blur", true);

                /* seçileni öne al */
                d3.select(this)
                    .classed("blur", false)
                    .classed("active-country", true)
                    .raise();

                const bounds = path.bounds(d);
                const dx = bounds[1][0] - bounds[0][0];
                const dy = bounds[1][1] - bounds[0][1];
                const x = (bounds[0][0] + bounds[1][0]) / 2;
                const y = (bounds[0][1] + bounds[1][1]) / 2;
                const scale = Math.min(4, 0.9 / Math.max(dx / width, dy / height));
                const translate = [width / 2 - scale * x, height / 2 - scale * y];

                svg.transition()
                    .duration(1000)
                    .attr("transform", `translate(${translate}) scale(${scale})`);

            },3000);

        })
        .on("mouseleave", function(){

            clearTimeout(hoverTimer);

        })
        .on("click", function(){

            if(!zoomed) return;

            zoomed = false;

            countryPaths.classed("blur", false)
                        .classed("active-country", false);

            svg.transition()
               .duration(800)
               .attr("transform","translate(0,0) scale(1)");

        });

});

</script>

</body>
</html>
