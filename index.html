<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nekadar Kaldı - Dünya Haritası</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0b; /* Çok koyu gri/siyah arka plan */
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Harita Konteynırı */
        .map-container {
            margin-top: 50px;
            width: 60%; /* Çok büyük olmaması için */
            max-width: 800px;
            position: relative;
            background-color: #1a1a1a; /* Deniz rengi: Açık siyah */
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: visible;
        }

        /* SVG Harita Stili */
        svg {
            width: 100%;
            height: auto;
            transition: filter 0.5s ease;
        }

        /* Ülke (Kara Parçaları) Stili */
        path {
            fill: #4a4a4a; /* Kara parçaları: Koyu gri */
            stroke: #2a2a2a; /* Sınır çizgileri */
            stroke-width: 0.5;
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), 
                        fill 0.3s ease;
            transform-origin: center;
        }

        path:hover {
            fill: #808080; /* Üstüne gelince açık gri */
            /* 3 saniye bekleme animasyonu tetikleyicisi */
            transition-delay: 3s; 
            transform: scale(2.5); /* Çerçeve kadar büyüme */
            z-index: 100;
            position: relative;
        }

        /* Blur Efekti: Bir ülkeye odaklanıldığında haritanın geri kalanı */
        .map-container:has(path:hover) svg {
            filter: blur(4px);
            transition-delay: 3s;
        }

        /* Hover edilen ülkenin blurdan etkilenmemesi için */
        path:hover {
            filter: blur(0) !important;
        }

        .title {
            color: #eee;
            margin-top: 20px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <h2 class="title">NE KADAR KALDI?</h2>

    <div class="map-container">
        <svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
            <path d="M200,100 Q250,50 300,100 T400,150 L350,250 Z" /> <path d="M500,200 Q550,150 600,200 T700,250 L650,350 Z" /> <path d="M700,50 Q750,20 800,50 T900,100 L850,200 Z" /> </svg>
    </div>

</body>
</html>
