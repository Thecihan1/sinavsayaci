<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Nekadar Kaldı - Dünya Haritası</title>
    <style>
        body {
            margin: 0;
            background-color: #0b0b0b;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            color: #eee;
        }

        .title { margin-top: 30px; letter-spacing: 3px; }

        /* Harita Kutusu: Boyutlar sabit, taşmalar gizli */
        .map-container {
            margin-top: 40px;
            width: 800px; 
            height: 450px;
            background-color: #1a1a1a; /* Deniz Rengi: Açık Siyah */
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 1px solid #333;
        }

        /* Katman yapısı: Zoom bu div üzerinden yapılacak */
        #zoom-layer {
            width: 100%;
            height: 100%;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: 0 0; /* Sol üstten referans alıp JS ile hesaplayacağız */
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Kara Parçaları: Açık Gri */
        path {
            fill: #4a4a4a;
            stroke: #1a1a1a;
            stroke-width: 0.4;
            transition: fill 0.3s ease, filter 0.8s ease, opacity 0.8s ease;
            cursor: pointer;
        }

        path:hover { fill: #888; }

        /* Efektler */
        .blurred { filter: blur(4px); opacity: 0.2; }
        .focused { fill: #ffffff !important; filter: none !important; opacity: 1 !important; }
    </style>
</head>
<body>

    <h2 class="title">NE KADAR KALDI?</h2>

    <div class="map-container">
        <div id="zoom-layer">
            <svg id="worldMap" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid slice">
                <g id="countries-group"></g>
            </svg>
        </div>
    </div>

<script>
    const group = document.getElementById('countries-group');
    const zoomLayer = document.getElementById('zoom-layer');
    let zoomTimer;

    // Harita verisini çek ve çiz
    fetch('https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson')
        .then(res => res.json())
        .then(geoData => {
            geoData.features.forEach(feature => {
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", createPath(feature));
                
                path.addEventListener('mouseenter', () => {
                    zoomTimer = setTimeout(() => zoomToCountry(path), 2000);
                });
                path.addEventListener('mouseleave', () => {
                    clearTimeout(zoomTimer);
                    resetZoom();
                });
                group.appendChild(path);
            });
        });

    function createPath(feature) {
        let d = "";
        const coords = feature.geometry.type === "MultiPolygon" ? feature.geometry.coordinates : [feature.geometry.coordinates];
        coords.forEach(poly => {
            const ring = feature.geometry.type === "MultiPolygon" ? poly[0] : poly;
            ring.forEach((c, i) => {
                const x = (c[0] + 180) * (1000 / 360);
                const y = (90 - c[1]) * (500 / 180);
                d += (i === 0 ? "M" : "L") + x + "," + y;
            });
            d += "Z";
        });
        return d;
    }

    function zoomToCountry(el) {
        const bbox = el.getBBox();
        const containerWidth = 800;
        const containerHeight = 450;

        // Ülke merkezini bul
        const centerX = bbox.x + bbox.width / 2;
        const centerY = bbox.y + bbox.height / 2;

        // Zoom ölçeği (Sabit 4 kat büyüme veya ülke boyutuna göre dinamik)
        const scale = 4;

        // Zoom katmanını merkeze göre kaydır
        const tx = (containerWidth / 2) - (centerX * scale);
        const ty = (containerHeight / 2) - (centerY * scale);

        zoomLayer.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
        
        // Blur ve Fokus
        document.querySelectorAll('path').forEach(p => {
            if(p === el) p.classList.add('focused');
            else p.classList.add('blurred');
        });
    }

    function resetZoom() {
        zoomLayer.style.transform = "translate(0,0) scale(1)";
        document.querySelectorAll('path').forEach(p => {
            p.classList.remove('focused', 'blurred');
        });
    }
</script>
</body>
</html>
