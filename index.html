<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nekadar Kaldı - Dünya Haritası</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0b;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            justify-content: center;
            overflow: hidden;
        }

        .title {
            color: #eee;
            margin-bottom: 20px;
            letter-spacing: 5px;
            transition: filter 0.5s ease;
            z-index: 10;
        }

        /* Harita Çerçevesi */
        .map-wrapper {
            width: 85%;
            max-width: 1000px;
            background-color: #151515; /* Deniz: Açık Siyah */
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            position: relative;
            transition: filter 0.5s ease;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Ülkeler */
        path {
            fill: #333; /* Kara: Koyu Gri */
            stroke: #151515;
            stroke-width: 0.7;
            cursor: pointer;
            transition: fill 0.3s ease;
        }

        path:hover {
            fill: #555;
        }

        /* Zoom Paneli */
        #zoom-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
        }

        #zoom-overlay.active {
            display: flex;
        }

        #zoomed-svg-container {
            width: 70%;
            max-width: 800px;
            transform: scale(0.1);
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        #zoom-overlay.active #zoomed-svg-container {
            transform: scale(1.8); /* Büyük zoom */
        }

        /* Bulanıklık Sınıfı */
        .is-blurred {
            filter: blur(15px);
            pointer-events: none;
        }

        /* Zoom'daki Ülkenin Rengi */
        #zoomed-svg-container path {
            fill: #888 !important;
            stroke: #fff;
            stroke-width: 0.3;
        }
    </style>
</head>
<body>

    <h1 class="title" id="main-title">NE KADAR KALDI?</h1>

    <div class="map-wrapper" id="content-to-blur">
        <svg viewBox="0 0 1000 480" xmlns="http://www.w3.org/2000/svg">
            <g id="world-map-paths">
                <path d="M110,80 L250,80 L280,180 L220,280 L80,250 Z" />
                <path d="M220,285 L285,285 L260,450 L200,350 Z" />
                <path d="M460,220 L580,200 L620,300 L580,440 L500,420 L450,300 Z" />
                <path d="M460,100 L580,80 L600,180 L460,200 Z" />
                <path d="M600,80 L850,80 L920,300 L750,350 L600,200 Z" />
                <path d="M800,380 L900,380 L920,450 L820,460 Z" />
                <path d="M320,30 L400,20 L420,80 L320,100 Z" />
            </g>
        </svg>
    </div>

    <div id="zoom-overlay">
        <svg id="zoomed-svg-container" viewBox="0 0 1000 480"></svg>
    </div>

    <script>
        const paths = document.querySelectorAll('#world-map-paths path');
        const overlay = document.getElementById('zoom-overlay');
        const zoomedContainer = document.getElementById('zoomed-svg-container');
        const contentToBlur = document.getElementById('content-to-blur');
        const mainTitle = document.getElementById('main-title');

        let timer;

        paths.forEach(country => {
            // Üstüne gelince
            country.addEventListener('mouseenter', () => {
                timer = setTimeout(() => {
                    // Zoom'u hazırla
                    const clone = country.cloneNode(true);
                    zoomedContainer.innerHTML = '';
                    zoomedContainer.appendChild(clone);
                    
                    // Efektleri başlat
                    overlay.classList.add('active');
                    contentToBlur.classList.add('is-blurred');
                    mainTitle.classList.add('is-blurred');
                }, 3000); // 3 Saniye Bekleme
            });

            // Üstünden çekince sayacı durdur
            country.addEventListener('mouseleave', () => {
                clearTimeout(timer);
            });
        });

        // Zoom'u kapatmak için herhangi bir yere tıkla
        overlay.addEventListener('click', () => {
            overlay.classList.remove('active');
            contentToBlur.classList.remove('is-blurred');
            mainTitle.classList.remove('is-blurred');
            clearTimeout(timer);
        });
    </script>
</body>
</html>
