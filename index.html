<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sayaç Merkezi - Profesyonel Panel</title>
    <style>
        :root {
            --mat-black: #121212;
            --light-gray: #1e1e1e;
            --accent: #ffffff;
            --text: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #080808;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            transition: background 0.5s ease;
        }

        /* --- YÖNETİM PANELİ (ADMİN) --- */
        #admin-panel {
            background: rgba(18, 18, 18, 0.95);
            padding: 20px;
            border-bottom: 1px solid #333;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        input, button {
            background: var(--light-gray);
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 5px;
            outline: none;
        }

        button {
            cursor: pointer;
            background: #fff;
            color: #000;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background: #ccc; }

        /* --- SAYAÇ KUTUCUKLARI --- */
        #counter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            padding: 50px 10%;
        }

        .counter-card {
            background: rgba(20, 20, 20, 0.85); /* Mat Siyah */
            border: 1px solid #2a2a2a;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            position: relative;
        }

        .counter-card h3 {
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.1rem;
            color: #fff;
        }

        .timer-unit {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .unit {
            display: flex;
            flex-direction: column;
        }

        .unit span:first-child {
            font-size: 2rem;
            font-weight: bold;
        }

        .unit span:last-child {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: #ff4444;
            font-size: 12px;
            cursor: pointer;
        }

        /* Arka Plan Scripti Kısmı */
        .bg-loader {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="admin-panel">
        <input type="text" id="event-name" placeholder="Etkinlik Adı (Örn: Yılbaşı)">
        <input type="datetime-local" id="event-date">
        <button onclick="addCounter()">Sayaç Ekle</button>
        
        <div class="bg-loader">
            <span>Arka Plan Yükle:</span>
            <input type="file" id="bg-upload" accept="image/*" onchange="changeBackground(event)">
        </div>
    </div>

    <div id="counter-grid"></div>

    <script>
        let counters = JSON.parse(localStorage.getItem('myCounters')) || [];

        // Sayfayı Başlat
        function init() {
            renderCounters();
            setInterval(updateAllTimers, 1000);
            const savedBg = localStorage.getItem('siteBg');
            if(savedBg) document.body.style.backgroundImage = `url(${savedBg})`;
        }

        // Sayaç Ekle
        function addCounter() {
            const name = document.getElementById('event-name').value;
            const date = document.getElementById('event-date').value;

            if(!name || !date) return alert("Lütfen tüm alanları doldur!");

            const newCounter = {
                id: Date.now(),
                name: name,
                target: new Date(date).getTime()
            };

            counters.push(newCounter);
            saveAndRender();
        }

        // Sayaç Sil
        function deleteCounter(id) {
            counters = counters.filter(c => c.id !== id);
            saveAndRender();
        }

        // Verileri Kaydet ve Çiz
        function saveAndRender() {
            localStorage.setItem('myCounters', JSON.stringify(counters));
            renderCounters();
        }

        function renderCounters() {
            const grid = document.getElementById('counter-grid');
            grid.innerHTML = "";

            counters.forEach(c => {
                grid.innerHTML += `
                    <div class="counter-card" id="card-${c.id}">
                        <button class="delete-btn" onclick="deleteCounter(${c.id})">Kaldır</button>
                        <h3>${c.name}</h3>
                        <div class="timer-unit" id="timer-${c.id}">
                            <div class="unit"><span class="d">00</span><span>Gün</span></div>
                            <div class="unit"><span class="h">00</span><span>Saat</span></div>
                            <div class="unit"><span class="m">00</span><span>Dak</span></div>
                            <div class="unit"><span class="s">00</span><span>Sn</span></div>
                        </div>
                    </div>
                `;
            });
        }

        // Zamanı Güncelle
        function updateAllTimers() {
            counters.forEach(c => {
                const now = new Date().getTime();
                const diff = c.target - now;

                if (diff > 0) {
                    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const secs = Math.floor((diff % (1000 * 60)) / 1000);

                    const el = document.getElementById(`timer-${c.id}`);
                    if(el) {
                        el.querySelector('.d').innerText = days;
                        el.querySelector('.h').innerText = hours;
                        el.querySelector('.m').innerText = mins;
                        el.querySelector('.s').innerText = secs;
                    }
                }
            });
        }

        // Arka Plan Değiştirme Scripti
        function changeBackground(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const url = reader.result;
                document.body.style.backgroundImage = `url(${url})`;
                localStorage.setItem('siteBg', url);
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        init();
    </script>
</body>
</html>
