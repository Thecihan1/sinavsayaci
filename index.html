<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Dünya Haritası</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>
<style>
body { background:#0a0f1e; text-align:center; color:white; }
.country { fill:#2a6496; stroke:#000; }
.country:hover { fill:orange; }
</style>
</head>
<body>

<h1>Dünya Haritası</h1>
<svg id="map" width="960" height="500"></svg>

<script>
const svg = d3.select("#map");
const projection = d3.geoNaturalEarth1().scale(150).translate([480,250]);
const path = d3.geoPath().projection(projection);

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
.then(function(data){
    const countries = topojson.feature(data, data.objects.countries);
    svg.selectAll("path")
       .data(countries.features)
       .enter()
       .append("path")
       .attr("d", path)
       .attr("class","country");
});
</script>

</body>
</html>
