<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Minimalist Dünya Haritası</title>
    <style>
        body {
            background-color: #0d0d0d; /* Sayfa arka planı koyu */
            display: flex;
            justify-content: center;
            margin: 0;
            padding-top: 40px; /* Üstten boşluk */
            overflow-x: hidden;
            font-family: sans-serif;
        }

        /* Harita Kutusu (Kısıtlı Boyut) */
        #map-wrapper {
            width: 700px; 
            height: 400px;
            background-color: #1a1a1a; /* Deniz Rengi (Açık Siyah) */
            border-radius: 8px;
            position: relative;
            overflow: hidden; /* Zoom dışarı taşmasın */
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        svg {
            width: 100%;
            height: 100%;
            transition: transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform-origin: center;
        }

        /* Ülkeler */
        path {
            fill: #b0b0b0; /* Kara parçaları: Açık Gri */
            stroke: #1a1a1a; /* Sınırlar deniz renginde */
            stroke-width: 0.5;
            transition: fill 0.3s, filter 0.8s, opacity 0.8s;
            cursor: crosshair;
        }

        /* Hover anındaki anlık renk */
        path:hover {
            fill: #ffffff;
        }

        /* Zoom sırasında diğerlerine uygulanacak blur */
        .blur-others {
            filter: blur(4px);
            opacity: 0.3;
        }

        /* Zoomlanan ülkenin öne çıkması */
        .focused {
            filter: none !important;
            opacity: 1 !important;
            fill: #ffffff !important;
        }
    </style>
</head>
<body>

<div id="map-wrapper">
    <svg id="worldMap" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid slice">
        <g id="regions">
            <path id="n_america" d="M100,100 L250,100 L300,250 L150,300 Z" />
            <path id="s_america" d="M280,300 L350,300 L320,450 L260,420 Z" />
            <path id="eurasia" d="M450,80 L850,80 L900,280 L500,320 Z" />
            <path id="africa" d="M480,300 L600,280 L620,450 L520,450 Z" />
            <path id="oceania" d="M800,350 L920,350 L900,450 L820,450 Z" />
            </g>
    </svg>
</div>

<script>
    const svg = document.getElementById('worldMap');
    const paths = document.querySelectorAll('path');
    let zoomTimer;

    paths.forEach(country => {
        country.addEventListener('mouseenter', (e) => {
            // 2 saniye bekleme süresini başlat
            zoomTimer = setTimeout(() => {
                performZoom(e.target);
            }, 2000);
        });

        country.addEventListener('mouseleave', () => {
            // 2 saniye dolmadan çıkarsa iptal et
            clearTimeout(zoomTimer);
            resetMap();
        });
    });

    function performZoom(target) {
        const bbox = target.getBBox();
        const containerWidth = 700;
        const containerHeight = 400;

        // Ülkenin merkezini bul
        const centerX = bbox.x + bbox.width / 2;
        const centerY = bbox.y + bbox.height / 2;

        // Zoom miktarını kutuya göre ayarla
        const scale = Math.min(containerWidth / bbox.width, containerHeight / bbox.height) * 0.6;
        
        // SVG'yi merkeze kaydır ve büyüt
        const moveX = (containerWidth / 2) - (centerX * scale);
        const moveY = (containerHeight / 2) - (centerY * scale);

        svg.style.transform = `translate(${moveX}px, ${moveY}px) scale(${scale})`;

        // Diğerlerini blurla
        paths.forEach(p => {
            if (p !== target) {
                p.classList.add('blur-others');
            } else {
                p.classList.add('focused');
            }
        });
    }

    function resetMap() {
        svg.style.transform = `translate(0, 0) scale(1)`;
        paths.forEach(p => {
            p.classList.remove('blur-others');
            p.classList.remove('focused');
        });
    }
</script>

</body>
</html>
