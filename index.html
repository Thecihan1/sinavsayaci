<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nekadar Kaldı - Dünya Haritası</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0b;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .title {
            color: #eee;
            margin-top: 30px;
            letter-spacing: 5px;
            font-weight: 300;
            transition: filter 0.5s ease;
        }

        /* Harita Çerçevesi */
        .map-container {
            margin-top: 40px;
            width: 70%;
            max-width: 900px;
            background-color: #151515; /* Deniz Rengi: Açık Siyah */
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            transition: filter 0.5s ease;
            position: relative;
        }

        svg {
            width: 100%;
            height: auto;
        }

        /* Ülkeler */
        path {
            fill: #333333; /* Kara parçaları: Koyu Gri */
            stroke: #151515;
            stroke-width: 0.5;
            cursor: pointer;
            transition: fill 0.3s ease;
        }

        path:hover {
            fill: #666666; /* Hover rengi */
        }

        /* Zoom ve Blur Efekti */
        .blur-effect {
            filter: blur(15px);
            pointer-events: none;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: zoom-out;
        }

        #zoomed-content {
            width: 80%;
            max-width: 800px;
            transform: scale(0.5);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #overlay.active {
            display: flex;
        }

        #overlay.active #zoomed-content {
            transform: scale(1.5); /* Büyük zoom */
        }

        #zoomed-content path {
            fill: #888888 !important;
            stroke: #fff;
            stroke-width: 0.5;
        }
    </style>
</head>
<body>

    <h1 class="title" id="main-title">NE KADAR KALDI?</h1>

    <div class="map-container" id="map-wrapper">
        <svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" id="main-svg">
            <g id="countries">
                <path d="M150,150 L220,150 L250,250 L180,350 L100,250 Z" />
                <path d="M300,50 L380,30 L400,100 L320,120 Z" />
                <path d="M480,250 L580,220 L620,300 L580,450 L500,420 L450,300 Z" />
                <path d="M500,100 L700,80 L850,150 L900,300 L750,350 L600,200 L500,200 Z" />
                <path d="M800,400 L880,380 L920,450 L840,480 Z" />
                <path d="M200,480 L800,480 L750,495 L250,495 Z" />
            </g>
        </svg>
    </div>

    <div id="overlay">
        <svg id="zoomed-content" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <script>
        const paths = document.querySelectorAll('#countries path');
        const overlay = document.getElementById('overlay');
        const zoomedContent = document.getElementById('zoomed-content');
        const mapWrapper = document.getElementById('map-wrapper');
        const mainTitle = document.getElementById('main-title');

        let timer;

        paths.forEach(path => {
            path.addEventListener('mouseenter', () => {
                // 3 saniye sayacı başlat
                timer = setTimeout(() => {
                    // Klon oluştur
                    const clone = path.cloneNode(true);
                    zoomedContent.innerHTML = '';
                    zoomedContent.appendChild(clone);
                    
                    // Efektleri aç
                    overlay.classList.add('active');
                    mapWrapper.classList.add('blur-effect');
                    mainTitle.classList.add('blur-effect');
                }, 3000); // 3000ms = 3 saniye
            });

            path.addEventListener('mouseleave', () => {
                clearTimeout(timer);
            });
        });

        // Kapatmak için tıkla
        overlay.addEventListener('click', () => {
            overlay.classList.remove('active');
            mapWrapper.classList.remove('blur-effect');
            mainTitle.classList.remove('blur-effect');
            clearTimeout(timer);
        });
    </script>
</body>
</html>
