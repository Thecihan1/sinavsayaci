<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom Harita</title>
    <style>
        body {
            background-color: #121212; /* Genel sayfa koyu tema */
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            font-family: sans-serif;
        }

        /* Harita Konteynırı */
        #map-container {
            position: relative;
            width: 600px; /* Çok büyük olmasın demiştin */
            height: 400px;
            margin-top: 50px; /* Orta üst kısım */
            background-color: #1a1a1a; /* Deniz rengi (Açık siyah) */
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            transition: all 0.5s ease;
        }

        /* SVG Harita Stili */
        svg {
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        /* Kara parçaları */
        path {
            fill: #d1d1d1; /* Açık gri tonları */
            stroke: #1a1a1a;
            stroke-width: 0.5;
            transition: fill 0.3s;
            cursor: pointer;
        }

        path:hover {
            fill: #ffffff; /* Üzerine gelince parlasın */
        }

        /* Blur Efekti Arka Planı */
        .blurred {
            filter: blur(5px);
            opacity: 0.4;
        }

        /* Zoomlandığında kutuyu doldurma mantığı JS ile yönetilecek */
    </style>
</head>
<body>

    <div id="map-container">
        <svg id="world-map" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
            <path d="M150,150 L250,150 L200,250 Z" data-name="Ulke1"></path>
            <path d="M400,100 L500,100 L500,200 L400,200 Z" data-name="Ulke2"></path>
            <path d="M700,300 L850,300 L775,450 Z" data-name="Ulke3"></path>
            </svg>
    </div>

    <script>
        const paths = document.querySelectorAll('path');
        const svg = document.getElementById('world-map');
        const container = document.getElementById('map-container');
        let zoomTimeout;

        paths.forEach(path => {
            path.addEventListener('mouseenter', (e) => {
                // 2 saniye bekleme süresi başlat
                zoomTimeout = setTimeout(() => {
                    zoomToCountry(e.target);
                }, 2000);
            });

            path.addEventListener('mouseleave', () => {
                // Üstünden çekilirse iptal et ve resetle
                clearTimeout(zoomTimeout);
                resetZoom();
            });
        });

        function zoomToCountry(element) {
            const bbox = element.getBBox();
            const centerX = bbox.x + bbox.width / 2;
            const centerY = bbox.y + bbox.height / 2;
            
            // Zoom miktarını hesapla (Kutuyu kaplayacak şekilde)
            const scale = 4; 
            const moveX = 500 - (centerX * scale);
            const moveY = 250 - (centerY * scale);

            // Stilleri uygula
            svg.style.transform = `translate(${moveX}px, ${moveY}px) scale(${scale})`;
            
            // Diğer her şeyi blurla (Basit yöntem: SVG içine class ekle)
            paths.forEach(p => {
                if(p !== element) p.classList.add('blurred');
            });
        }

        function resetZoom() {
            svg.style.transform = `translate(0,0) scale(1)`;
            paths.forEach(p => p.classList.remove('blurred'));
        }
    </script>
</body>
</html>
