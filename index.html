<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nekadar Kaldı - Dünya Haritası</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0b; /* Çok koyu gri/siyah arka plan */
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title {
            color: #eee;
            margin-top: 20px;
            letter-spacing: 2px;
            transition: filter 0.3s ease;
        }

        /* Harita Konteynırı */
        .map-container {
            margin-top: 50px;
            width: 60%; /* Çok büyük olmaması için */
            max-width: 800px;
            position: relative;
            background-color: #1a1a1a; /* Deniz rengi: Açık siyah */
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: visible;
            transition: filter 0.3s ease;
        }

        /* SVG Harita Stili */
        #world-map {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Ülke (Kara Parçaları) Stili */
        path {
            fill: #4a4a4a; /* Kara parçaları: Koyu gri */
            stroke: #2a2a2a; /* Sınır çizgileri */
            stroke-width: 0.5;
            cursor: pointer;
            transition: fill 0.3s ease;
        }

        path:hover {
            fill: #808080; /* Üstüne gelince açık gri */
        }

        /* ZOOM EFEKTİ İÇİN CSS SINIFLARI (JS ile eklenecek) */

        /* Bulanıklaşacak arka plan öğeleri */
        .blur-background {
            filter: blur(8px) grayscale(50%);
            pointer-events: none; /* Arka plana tıklamayı engelle */
        }

        /* Yakınlaştırılmış ülkenin stilini belirleyen konteynır */
        #zoom-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000; /* Her şeyin üstünde */
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #zoom-container.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Yakınlaştırılan ülkenin kopyası */
        #zoomed-country {
            width: auto;
            height: auto;
            max-width: 80%; /* Harita çerçevesi kadar büyüme */
            max-height: 80%;
            transform: scale(1);
            transition: transform 0.5s ease;
        }

        #zoomed-country path {
            fill: #a0a0a0; /* Yakınlaşınca daha açık gri */
            stroke: #fff; /* Beyaz sınırlar */
            stroke-width: 1;
        }
    </style>
</head>
<body>

    <h2 class="title">NE KADAR KALDI?</h2>

    <div class="map-container" id="main-map-container">
        <svg id="world-map" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
            <path id="country-1" d="M200,100 Q250,50 300,100 T400,150 L350,250 Z" />
            <path id="country-2" d="M500,200 Q550,150 600,200 T700,250 L650,350 Z" />
            <path id="country-3" d="M700,50 Q750,20 800,50 T900,100 L850,200 Z" />
        </svg>
    </div>

    <div id="zoom-container">
        <svg id="zoomed-country" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
            </svg>
    </div>

    <script>
        const worldMap = document.getElementById('world-map');
        const mainMapContainer = document.getElementById('main-map-container');
        const title = document.querySelector('.title');
        const zoomContainer = document.getElementById('zoom-container');
        const zoomedCountrySvg = document.getElementById('zoomed-country');

        let hoverTimer; // 3 saniye sayacı
        const zoomDelay = 3000; // 3 saniye (milisaniye)

        // Haritadaki tüm 'path' (ülke) öğelerine olay dinleyicileri ekle
        worldMap.querySelectorAll('path').forEach(country => {
            
            // MOUSE ÜSTÜNE GELDİĞİNDE
            country.addEventListener('mouseenter', (e) => {
                // Eğer zaten zoom aktifse yeni sayaç başlatma
                if (zoomContainer.classList.contains('active')) return;

                hoverTimer = setTimeout(() => {
                    activateZoom(e.target);
                }, zoomDelay);
            });

            country.addEventListener('mouseleave', () => {
                // Eğer zoom aktif değilse sayacı iptal et
                if (!zoomContainer.classList.contains('active')) {
                    clearTimeout(hoverTimer);
