<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nekadar Kaldı</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0b;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .title {
            color: #eee;
            margin-bottom: 20px;
            letter-spacing: 3px;
            transition: filter 0.4s;
        }

        /* Harita Çerçevesi */
        .map-container {
            width: 70%;
            max-width: 800px;
            background-color: #1a1a1a; /* Deniz: Açık Siyah */
            border-radius: 15px;
            padding: 20px;
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            overflow: hidden; /* Taşmaları engelle */
        }

        svg#world-map {
            width: 100%;
            height: auto;
            transition: filter 0.5s ease;
        }

        /* Ülkeler */
        path {
            fill: #444; /* Karalar: Koyu Gri */
            stroke: #1a1a1a;
            stroke-width: 0.8;
            cursor: pointer;
            transition: fill 0.3s;
        }

        path:hover {
            fill: #666;
        }

        /* ZOOM EKRANI (JS ile kontrol edilecek) */
        #zoom-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; /* Sadece zoom anında açılır */
            justify-content: center;
            align-items: center;
            z-index: 10;
            background: rgba(0,0,0,0.2); /* Hafif karartma */
        }

        /* Zoomlanan Ülkenin Stili */
        #zoomed-country-svg {
            width: 80%;
            height: 80%;
            transform: scale(0);
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .active #zoomed-country-svg {
            transform: scale(1);
        }

        /* Blur Sınıfı */
        .blur {
            filter: blur(12px);
        }
    </style>
</head>
<body>

    <h2 class="title" id="page-title">NE KADAR KALDI?</h2>

    <div class="map-container" id="frame">
        <svg id="world-map" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
            <g id="main-paths">
                <path d="M150,150 L250,130 L280,250 L180,300 Z" id="k-amerika" />
                <path d="M450,200 L580,180 L620,300 L550,450 L480,400 Z" id="afrika" />
                <path d="M500,80 L700,70 L850,150 L750,300 L550,200 Z" id="avrasya" />
                <path d="M800,380 L900,370 L920,450 L820,460 Z" id="avustralya" />
            </g>
        </svg>

        <div id="zoom-layer">
            <svg id="zoomed-country-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
    </div>

    <script>
        const paths = document.querySelectorAll('#main-paths path');
        const zoomLayer = document.getElementById('zoom-layer');
        const zoomedSvg = document.getElementById('zoomed-country-svg');
        const worldMap = document.getElementById('world-map');
        const pageTitle = document.getElementById('page-title');
        
        let timer;

        paths.forEach(country => {
            country.addEventListener('mouseenter', () => {
                // 3 saniye sayacı
                timer = setTimeout(() => {
                    const bbox = country.getBBox();
                    
                    // 1. Zoom SVG'sinin içini hazırla ve merkezle
                    zoomedSvg.setAttribute('viewBox', `${bbox.x} ${bbox.y} ${bbox.width} ${bbox.height}`);
                    zoomedSvg.innerHTML = country.outerHTML;
                    
                    // 2. Efektleri uygula
                    zoomLayer.style.display = 'flex';
                    setTimeout(() => zoomLayer.classList.add('active'), 10); // Animasyon tetikleyici
                    
                    worldMap.classList.add('blur');
                    pageTitle.classList.add('blur');
                }, 3000);
            });

            country.addEventListener('mouseleave', () => {
                clearTimeout(timer);
            });
        });

        // Kapatmak için zoomlanan ülkeye veya boşluğa tıkla
        zoomLayer.addEventListener('click', () => {
            zoomLayer.classList.remove('active');
            setTimeout(() => zoomLayer.style.display = 'none', 600);
            
            worldMap.classList.remove('blur');
            pageTitle.classList.remove('blur');
            clearTimeout(timer);
        });
    </script>
</body>
</html>
